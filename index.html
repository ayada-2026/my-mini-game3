<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="application-name" content="문장 반복 퀴즈">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="문장 반복 퀴즈">
  <meta name="theme-color" content="#f2efe6">
  <title>문장 반복 퀴즈</title>
  <link rel="icon" type="image/png" sizes="192x192" href="./assets/icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/icons/apple-touch-icon.png">
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app-shell">
    <section id="heroCard" class="hero-card">
      <div class="hero-copy">
        <p class="eyebrow">내 문장 반복 학습</p>
        <h1>문장 반복 퀴즈 앱</h1>
        <p class="hero-text">자주 쓸 문장을 떠올리고, 반복하고, 말해보는 앱입니다.</p>
      </div>

      <div class="hero-actions">
        <button class="primary-button" type="button" data-view-target="quiz">바로 퀴즈</button>
        <button class="secondary-button" type="button" data-view-target="add">문장 추가</button>
      </div>
    </section>

    <nav id="tabBar" class="tab-bar" aria-label="화면 이동">
      <button class="tab-button is-active" type="button" data-view-target="dashboard">홈</button>
      <button class="tab-button" type="button" data-view-target="library">문장</button>
      <button class="tab-button" type="button" data-view-target="add">추가</button>
      <button class="tab-button" type="button" data-view-target="quiz">퀴즈</button>
    </nav>

    <section id="dashboardView" class="view is-active">
      <div class="dashboard-grid home-dashboard-grid">
        <article class="panel-card">
          <div class="section-head">
            <div>
              <p class="section-label">오늘</p>
              <h2>오늘의 문장</h2>
            </div>
          </div>
          <div id="todaySentenceList" class="mini-card-list"></div>
          <button id="todayMoreButton" class="secondary-button compact-button home-more-button" type="button">더 보기</button>
        </article>

        <details class="panel-card home-collapsible">
          <summary class="section-head">
            <div>
              <p class="section-label">최근</p>
              <h2>최근 추가 문장</h2>
            </div>
            <span class="collapsible-copy"><span class="summary-closed">보기 ▾</span><span class="summary-open">숨기기 ▴</span></span>
          </summary>
          <div id="recentSentenceList" class="mini-card-list"></div>
        </details>

        <article class="panel-card home-task-card">
          <div>
            <p class="section-label">오늘 할 것</p>
            <p class="home-task-line">복습 <strong id="reviewCountText">0</strong> · 말하기 <strong id="speakingPendingText">0</strong></p>
          </div>
        </article>
      </div>
    </section>

    <section id="libraryView" class="view">
      <article class="panel-card">
        <div class="section-head">
          <div>
            <p class="section-label">문장 보관함</p>
            <h2>문장 리스트</h2>
          </div>
        </div>

        <div class="filter-row">
          <label class="field">
            <span>카테고리</span>
            <select id="categoryFilter"></select>
          </label>

          <label class="field">
            <span>상태</span>
            <select id="statusFilter">
              <option value="all">전체</option>
              <option value="new">새 문장</option>
              <option value="learning">학습 중</option>
              <option value="familiar">익숙함</option>
            </select>
          </label>

          <label class="field search-field">
            <span>검색</span>
            <input id="searchInput" type="text" placeholder="영어, 한국어, 메모">
          </label>

          <label class="checkbox-field">
            <input id="favoriteOnlyFilter" type="checkbox">
            <span>즐겨찾기만</span>
          </label>
        </div>

        <div id="sentenceList" class="sentence-list"></div>
      </article>
    </section>

    <section id="addView" class="view">
      <article class="panel-card">
        <div class="section-head">
          <div>
            <p class="section-label">문장 추가</p>
            <h2 id="addViewTitle">문장 추가</h2>
          </div>
        </div>

        <div id="editNotice" class="edit-notice hidden-field">
          <p id="editNoticeText" class="edit-notice-text"></p>
          <button id="cancelEditButton" class="secondary-button compact-button" type="button">수정 취소</button>
        </div>

        <form id="sentenceForm" class="sentence-form">
          <label class="field">
            <span>한국어</span>
            <textarea id="koreanInput" name="korean" rows="2" placeholder="짧은 한국어 문장을 입력하세요." required></textarea>
          </label>

          <label class="field">
            <span>영어</span>
            <textarea id="englishInput" name="english" rows="2" placeholder="영어 문장을 입력하세요&#10;예: I just want to stay home today." required></textarea>
          </label>

          <p id="similarSentenceHint" class="inline-hint hidden-field"></p>

          <details id="additionalInfoDetails" class="additional-details">
            <summary>
              <span class="summary-closed">추가 정보 입력 ▾</span>
              <span class="summary-open">추가 정보 숨기기 ▴</span>
            </summary>

            <div class="form-grid add-info-grid">
              <label class="field">
                <span>카테고리</span>
                <select id="categoryInput" name="category"></select>
              </label>

              <label id="customCategoryField" class="field hidden-field">
                <span>직접 입력</span>
                <input id="customCategoryInput" type="text" placeholder="회의, 전화, 공부">
              </label>
            </div>

            <label class="field">
              <span>문장 구조</span>
              <input id="patternInput" name="pattern" type="text" placeholder="영어 문장을 입력하면 자동 생성됩니다." readonly>
            </label>

            <div id="difficultyPreview" class="auto-meta">난이도는 문장 길이와 구조를 보고 자동으로 정해집니다.</div>

            <label class="field">
              <span>메모</span>
              <input id="noteInput" name="note" type="text" placeholder="상황이나 느낌을 짧게 적어보세요.">
            </label>

            <div class="example-toggle-wrap">
              <button id="toggleExampleButton" class="secondary-button compact-button" type="button">+ 확장 예문 추가</button>
            </div>

            <label id="exampleField" class="field hidden-field">
              <span>확장 예문</span>
              <textarea id="exampleInput" name="example" rows="2" placeholder="I just want to stay home and do nothing tonight."></textarea>
            </label>
          </details>

          <div class="form-actions">
            <button id="submitSentenceButton" class="primary-button" type="submit">문장 저장</button>
            <button id="forceDuplicateSaveButton" class="secondary-button compact-button hidden-field" type="button">중복이어도 저장</button>
            <p id="formMessage" class="form-message" aria-live="polite"></p>
          </div>

          <div id="postSaveActions" class="post-save-actions hidden-field">
            <button id="continueAddButton" class="secondary-button compact-button" type="button">계속 추가하기</button>
            <button id="goHomeAfterSaveButton" class="primary-button compact-button" type="button">홈으로</button>
          </div>
        </form>
      </article>
    </section>

    <section id="quizView" class="view">
      <article class="panel-card">
        <div id="quizTop" class="quiz-top">
          <div class="quiz-utility-row">
            <button id="quizBackButton" class="secondary-button compact-button quiz-back-button" type="button">뒤로가기</button>
            <div class="quiz-progress-line" aria-live="polite">
              <span class="quiz-progress-copy">진행 <strong id="quizProgressText">0 / 0</strong></span>
              <span class="quiz-progress-separator">·</span>
              <span class="quiz-progress-copy">남은 <strong id="quizRemainingText">0</strong></span>
            </div>
            <label class="checkbox-field auto-next-field compact-auto-next">
              <input id="autoNextToggle" type="checkbox">
              <span>정답 자동 진행</span>
            </label>
            <label class="checkbox-field compact-sound-field">
              <input id="soundToggle" type="checkbox" checked>
              <span>효과음</span>
            </label>
            <button id="resetQuizButton" class="secondary-button compact-button hidden-field" type="button">새 라운드</button>
          </div>
          <div class="mode-chip-row" role="tablist" aria-label="퀴즈 모드">
            <button class="mode-chip is-active" type="button" data-mode="ko_to_en">한국어 → 영어</button>
            <button class="mode-chip" type="button" data-mode="en_to_ko">영어 → 뜻</button>
            <button class="mode-chip" type="button" data-mode="fill_blank">빈칸 채우기</button>
          </div>
        </div>

        <div id="quizEmptyState" class="empty-state hidden-field"></div>

        <section id="quizCard" class="quiz-card">
          <div class="quiz-card-top">
            <div class="quiz-question-head">
              <span id="quizModeBadge" class="mode-badge"></span>
              <button id="quizFavoriteButton" class="pill-button quiz-favorite-icon" type="button">☆</button>
              <h3 id="quizPromptText" class="quiz-prompt"></h3>
              <button id="quizHintButton" class="secondary-button compact-button quiz-hint-button hidden-field" type="button">힌트 보기</button>
              <p id="quizHintText" class="quiz-hint hidden-field"></p>
            </div>

            <div class="quiz-toggle-row">
              <button id="quizSpeakingButton" class="pill-button" type="button">말해봄</button>
            </div>
          </div>

          <div id="quizInputArea" class="quiz-input-area"></div>
          <div id="quizChoiceArea" class="choice-list"></div>

          <article id="quizResultCard" class="result-card hidden-field" aria-live="polite">
            <p id="quizFeedbackText" class="feedback-text"></p>
            <p id="quizRepeatPromptText" class="repeat-prompt"></p>
            <div id="resultHero" class="result-hero">
              <div class="result-english-row">
                <strong id="resultEnglishText" class="result-english"></strong>
                <button id="resultListenButton" class="audio-icon-button hidden-field" type="button" aria-label="영어 문장 듣기" title="영어 문장 듣기">듣기</button>
              </div>
              <p id="resultKoreanText" class="result-korean"></p>
            </div>
            <p id="quizHintLine" class="quiz-hint-line hidden-field"></p>
            <div id="resultMetaGrid" class="result-grid">
              <div>
                <span>기본 틀</span>
                <strong id="resultPatternText"></strong>
              </div>
              <div>
                <span>응용 예문</span>
                <strong id="resultExampleText"></strong>
              </div>
              <div class="wide-result">
                <span>메모</span>
                <strong id="resultNoteText"></strong>
              </div>
            </div>
            <div id="quizCompleteSummary" class="complete-summary hidden-field"></div>
            <div id="quizCompletePreview" class="complete-preview hidden-field"></div>
            <button id="resultSpeakingButton" class="primary-button result-speaking-button hidden-field" type="button">말해봄</button>
          </article>

          <div class="quiz-footer">
            <button id="revealAnswerButton" class="secondary-button" type="button">정답 보기</button>
            <button id="nextQuestionButton" class="primary-button" type="button" disabled>다음 문장</button>
          </div>
        </section>
      </article>
    </section>
  </main>

  <script src="./script.js" defer></script>
</body>
</html>
